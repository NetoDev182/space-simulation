<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simulação Gravitacional em 3D de um Sistema Solar interagindo com um Buraco Negro, renderizado via GPU usando Three.js.">
    <title>Gravidade: Sistema Solar & Buraco Negro</title>
    <link rel="stylesheet" href="style.css">
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="ui-panel">
        <h1>Simulação <span>Gravitacional</span></h1>
        <p>Um sistema de 70.000 partículas utilizando <strong>Three.js</strong> para simular órbitas solares e a interferência destrutiva de um Buraco Negro Errante.</p>
        
        <div class="control-group">
            <label for="bh-mass">Massa do Buraco Negro</label>
            <input type="range" id="bh-mass" min="0" max="25000" value="7000">
        </div>
        
        <div class="control-group">
            <label for="sun-mass">Massa do Sol المركزي</label>
            <input type="range" id="sun-mass" min="5000" max="30000" value="12000">
        </div>
        
        <button id="reset-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" style="margin-right: 6px; vertical-align: middle;">
                <path d="M21 2v6h-6"></path>
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            </svg>
            Big Bang (Resetar Cosmo)
        </button>
    </div>

    <!-- ES Module Map for Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="main.js"></script>
    
    <!-- Autor -->
    <div style="position: fixed; bottom: 1rem; right: 1rem; font-size: 0.75rem; color: var(--text-secondary); font-family: 'Space Grotesk', sans-serif; z-index: 5; pointer-events: none;">
        Autor: Ademir Neto
    </div>
</body>
</html>
